<!--
  ================================================================
  [적용 위치] Cafe24 관리자 → 디자인 → 내 디자인 편집
             → product/detail.html (상품 상세 스킨)
             → </body> 직전에 삽입

  Cafe24 변수 목록:
    {$product_name}     - 상품명
    {$product_price}    - 정가 (숫자만, 예: 707000)
    {$product_sale_price} - 할인가
    {$product_image}    - 대표 이미지 URL
    {$product_summary}  - 상품 요약설명
    {$product_url}      - 상품 URL
    {$review_count}     - 리뷰 수
    {$review_avg}       - 평균 별점
    {$brand_name}       - 브랜드명
    {$cate_name_1}      - 1단계 카테고리명
    {$cate_name_2}      - 2단계 카테고리명
  ================================================================
-->

<!-- ② JSON-LD: Product 구조화 데이터 (body 끝에 삽입) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{$product_name}",
  "description": "{$product_summary}",
  "image": [
    "{$product_image}"
  ],
  "brand": {
    "@type": "Brand",
    "name": "소아벨라"
  },
  "sku": "{$product_code}",
  "mpn": "{$product_code}",
  "offers": {
    "@type": "Offer",
    "url": "https://soavela.com{$product_url}",
    "priceCurrency": "KRW",
    "price": "{$product_sale_price}",
    "priceValidUntil": "2025-12-31",
    "itemCondition": "https://schema.org/NewCondition",
    "availability": "https://schema.org/InStock",
    "seller": {
      "@type": "Organization",
      "name": "소아벨라"
    }
  },
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{$review_avg}",
    "reviewCount": "{$review_count}",
    "bestRating": "5",
    "worstRating": "1"
  }
}
</script>

<!-- ③ JSON-LD: BreadcrumbList (카테고리 경로 → 검색결과 URL 아래 표시) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "홈",
      "item": "https://soavela.com/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{$cate_name_1}",
      "item": "https://soavela.com/product/list.html?cate_no={$cate_no_1}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{$product_name}",
      "item": "https://soavela.com{$product_url}"
    }
  ]
}
</script>
